<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitboard Creator~1.04</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
    <style>
        /* 基础样式与主题（与上一版相同，为简洁省略，实际完整代码中保留） */
        /* 此处为占位，最终文件将包含完整样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; transition: background-color 0.2s, color 0.2s; }
        .editor-container { max-width: 1400px; width: 100%; border-radius: 32px; overflow: hidden; display: flex; flex-direction: row; backdrop-filter: blur(2px); transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s; position: relative; }
        .preview-area { flex: 1.2; padding: 40px 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right-width: 1px; border-right-style: solid; transition: background-color 0.2s, border-color 0.2s; }
        .main-title { font-size: 2.16rem; font-weight: 500; margin-bottom: 24px; letter-spacing: -0.02em; align-self: flex-start; padding-left: 8px; margin-left: 35px; transition: color 0.2s, border-color 0.2s; }
        .editable-name { cursor: pointer; border-bottom-width: 1px; border-bottom-style: dashed; display: inline-block; min-width: 2em; text-align: center; transition: border-color 0.2s, background-color 0.2s; }
        .editable-name:hover { transition: background-color 0.2s; }
        .canvas-wrapper { width: 100%; max-width: 900px; background: #ffffff; border-radius: 33px; box-shadow: 0 4px 16px rgba(0,0,0,0.02); padding: 24px 12px 12px 12px; transition: background-color 0.2s, box-shadow 0.2s; }
        .product-canvas-container { position: relative; width: 100%; background: #ffffff; border-radius: 23px; overflow: hidden; border-width: 1px; border-style: solid; cursor: grab; transition: border-color 0.2s; }
        .product-canvas-container:active { cursor: grabbing; }
        canvas#productCanvas { display: block; width: 100%; height: auto; pointer-events: auto; background: #ffffff; }
        .hint-text { margin-top: 16px; font-size: 0.9rem; display: flex; gap: 32px; justify-content: center; padding: 8px 24px; border-radius: 40px; transition: background-color 0.2s, color 0.2s; }
        .hint-text span { display: flex; align-items: center; gap: 6px; }
        .control-panel { width: 360px; padding: 32px 24px; overflow-y: auto; max-height: 800px; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        .control-panel h2 { font-size: 1.5rem; font-weight: 500; margin-bottom: 28px; transition: color 0.2s, text-shadow 0.2s; }
        .option-group { margin-bottom: 32px; border-bottom-width: 1px; border-bottom-style: solid; padding-bottom: 24px; transition: border-color 0.2s; }
        .option-group h3 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: 450; transition: color 0.2s; }
        .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .color-label { font-size: 0.95rem; width: 90px; transition: color 0.2s; }
        input[type="color"] { width: 70px; height: 42px; border-width: 2px; border-style: solid; border-radius: 12px; background: transparent; cursor: pointer; padding: 2px; transition: border-color 0.2s; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 16px 0 10px; font-size: 0.95rem; transition: color 0.2s; }
        .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; transition: accent-color 0.2s; }
        .feature-checkbox { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.95rem; transition: color 0.2s; }
        .feature-checkbox input[type="checkbox"] { width: 18px; height: 18px; transition: accent-color 0.2s; }
        .radio-group { margin: 12px 0; }
        .radio-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.95rem; }
        .radio-row input[type="radio"] { width: 16px; height: 16px; accent-color: #4d7ca1; transition: accent-color 0.2s; }
        .theme-pink .radio-row input[type="radio"] { accent-color: #ff7f9f; }
        .wallpaper-upload { border-radius: 20px; padding: 16px; text-align: center; border-width: 1px; border-style: dashed; margin-top: 10px; transition: background-color 0.2s, border-color 0.2s; }
        .button-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
        .action-btn { border: none; padding: 10px 16px; border-radius: 40px; font-size: 0.9rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border-width: 1px; border-style: solid; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        .action-btn.small { padding: 8px 12px; font-size: 0.85rem; }
        .file-input { display: none; }
        .wallpaper-status { margin-top: 14px; font-size: 0.8rem; transition: color 0.2s; }
        .palette-container { display: flex; justify-content: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
        .color-swatch:hover { transform: scale(1.1); }
        .slider-container { margin-top: 16px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 4px; transition: color 0.2s; }
        input[type=range] { width: 100%; height: 4px; border-radius: 4px; -webkit-appearance: none; transition: background-color 0.2s; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; transition: background-color 0.2s, box-shadow 0.2s; }
        .export-buttons { display: flex; flex-direction: column; gap: 14px; margin-top: 28px; }
        .export-btn { border: none; padding: 16px 20px; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-width: 1px; border-style: solid; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        .footer-note { margin-top: 30px; font-size: 0.7rem; text-align: center; border-top-width: 1px; border-top-style: solid; padding-top: 18px; transition: color 0.2s, border-color 0.2s; }
        .designer-credit { margin-top: 16px; font-size: 0.8rem; opacity: 0.7; text-align: center; transition: color 0.2s; }

        /* 主题颜色（深色/粉色） */
        body { background: #f5f7fa; }
        .editor-container { background: #ffffff; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15); border: 1px solid rgba(224, 230, 238, 0.6); }
        .preview-area { background: #fafcff; border-right-color: #e8ecf2; }
        .main-title { color: #1e2b3c; }
        .editable-name { border-bottom-color: #1e2b3c; }
        .editable-name:hover { background-color: #e0e7ff; }
        .canvas-wrapper { background: #ffffff; box-shadow: 0 4px 16px rgba(0,0,0,0.02); }
        .product-canvas-container { border-color: #eef2f6; }
        .hint-text { background: #f2f6fb; color: #6b7b8f; }
        .control-panel { background: #1e2b3c; color: #eef4fa; }
        .control-panel h2 { color: white; }
        .option-group { border-bottom-color: #304357; }
        .option-group h3 { color: #8fa5c0; }
        .color-label { color: #d3e0f0; }
        input[type="color"] { border-color: #3c5068; }
        .checkbox-row { color: #b0c5dd; }
        .checkbox-row input[type="checkbox"] { accent-color: #4d7ca1; }
        .feature-checkbox { color: #b0c5dd; }
        .feature-checkbox input[type="checkbox"] { accent-color: #4d7ca1; }
        .radio-row { color: #b0c5dd; }
        .radio-row input[type="radio"] { accent-color: #4d7ca1; }
        .wallpaper-upload { background: #253544; border-color: #5d7390; }
        .action-btn { background: #2e4057; color: white; border-color: #4d627c; }
        .action-btn:hover { background: #3e5670; }
        .wallpaper-status { color: #a6bbd4; }
        .slider-label { color: #b0c5dd; }
        input[type=range] { background: #304357; }
        input[type=range]::-webkit-slider-thumb { background: white; box-shadow: 0 2px 6px black; }
        .export-btn { background: #2f5778; color: white; border-color: #41729f; }
        .export-btn:hover { background: #3a6a91; }
        .export-btn.secondary { background: #2d3e54; border-color: #4c607b; }
        .export-btn.secondary:hover { background: #3c506a; }
        .footer-note { color: #627a99; border-top-color: #2f4259; }
        .designer-credit { color: #a0b2c4; }

        body.theme-pink { background: #ffe4ec; }
        .theme-pink .editor-container { background: #ffffff; box-shadow: 0 20px 40px -12px rgba(255, 120, 160, 0.3); border: 1px solid #ffc0d0; }
        .theme-pink .preview-area { background: #fafcff; border-right-color: #e8ecf2; }
        .theme-pink .main-title { color: #1e2b3c; }
        .theme-pink .editable-name { border-bottom-color: #1e2b3c; }
        .theme-pink .editable-name:hover { background-color: #e0e7ff; }
        .theme-pink .canvas-wrapper { background: #ffffff; box-shadow: 0 4px 16px rgba(190, 140, 160, 0.1); }
        .theme-pink .product-canvas-container { border-color: #f0d0dd; }
        .theme-pink .hint-text { background: #ffeef4; color: #a87b8b; }
        .theme-pink .control-panel { background: #ffa5b9; color: #ffffff; }
        .theme-pink .control-panel h2 { color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .theme-pink .option-group { border-bottom-color: #ffd0dd; }
        .theme-pink .option-group h3 { color: #fff0f5; }
        .theme-pink .color-label { color: #ffffff; }
        .theme-pink input[type="color"] { border-color: #ff99b0; }
        .theme-pink .checkbox-row { color: #ffffff; }
        .theme-pink .checkbox-row input[type="checkbox"] { accent-color: #ff7f9f; }
        .theme-pink .feature-checkbox { color: #ffffff; }
        .theme-pink .feature-checkbox input[type="checkbox"] { accent-color: #ff7f9f; }
        .theme-pink .radio-row { color: #ffffff; }
        .theme-pink .radio-row input[type="radio"] { accent-color: #ff7f9f; }
        .theme-pink .wallpaper-upload { background: #ffe0e8; border-color: #ffb0c2; }
        .theme-pink .action-btn { background: #ff7f9f; color: #ffffff; border-color: #ffbfcf; }
        .theme-pink .action-btn:hover { background: #ff6b8f; }
        .theme-pink .wallpaper-status { color: #4a2a36; }
        .theme-pink .slider-label { color: #ffffff; }
        .theme-pink input[type=range] { background: #ffd0dd; }
        .theme-pink input[type=range]::-webkit-slider-thumb { background: #ffffff; box-shadow: 0 2px 6px rgba(255, 80, 120, 0.5); }
        .theme-pink .export-btn { background: #ff6b8f; color: white; border-color: #ffbfcf; }
        .theme-pink .export-btn:hover { background: #ff4f7a; }
        .theme-pink .export-btn.secondary { background: #ff8faa; border-color: #ffbfcf; }
        .theme-pink .export-btn.secondary:hover { background: #ff7a9a; }
        .theme-pink .footer-note { color: #ffffff; border-top-color: #ffd0dd; }
        .theme-pink .designer-credit { color: #d96b8a; }

        .theme-toggle-wrapper { position: absolute; top: 20px; left: 20px; z-index: 100; }
        .theme-toggle-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: #2f5778; cursor: pointer; transition: background-color 0.2s, border-color 0.2s, transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .theme-pink .theme-toggle-btn { background: #ff7f9f; }
        .theme-toggle-btn:hover { transform: scale(1.05); }
        .theme-toggle-btn:active { transform: scale(0.95); }

        .dock-settings { margin-top: 10px; margin-left: 24px; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 12px; display: none; }
        .dock-settings.visible { display: block; }
        .dock-color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .dock-follow-row { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }

        #guideLineContainer { display: none; }

        #keyStyleContainer {
            margin-top: 10px;
            margin-left: 20px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            display: none;
        }
        .theme-pink #keyStyleContainer { background: rgba(255,200,200,0.2); }
        #keyStyleContainer .radio-group:first-child { margin-bottom: 20px; }
        #keyStyleContainer .radio-row { margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="editor-container">
    <div class="theme-toggle-wrapper">
        <div class="theme-toggle-btn" id="themeToggle" title="切换主题"></div>
    </div>

    <div class="preview-area">
        <div class="main-title" id="mainTitle">
            <span id="editableName" class="editable-name">你</span> 的 Hitboard Air
        </div>
        <div class="canvas-wrapper">
            <div class="product-canvas-container" id="canvasContainer">
                <canvas id="productCanvas" width="2600" height="1000"></canvas>
            </div>
            <div class="hint-text">
                <span>🖱️ 拖拽平移</span>
                <span>⚡ 滚轮缩放</span>
                <span>🔄 双击翻转</span>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <h2>选项</h2>

        <!-- 左手区域加键选项 -->
        <div class="option-group">
            <h3>左手区域加键选项</h3>
            <div class="radio-group">
                <div class="radio-row">
                    <input type="radio" name="directionLayout" id="layoutStandard" value="standard" checked>
                    <label for="layoutStandard">与拳键对称（触感上消熵，减少误操作）</label>
                </div>
                <div class="radio-row">
                    <input type="radio" name="directionLayout" id="layoutExplorer" value="explorer">
                    <label for="layoutExplorer">七星布局（方向键调低，可容纳 W 键或 Shift 键）</label>
                </div>
            </div>
            <div id="keyStyleContainer">
                <div class="radio-group">
                    <div class="radio-row">
                        <input type="radio" name="extraKeySelect" id="extraBoth" value="both" checked>
                        <label for="extraBoth">加 W、Shift 两键</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="extraKeySelect" id="extraOnlyW" value="onlyW">
                        <label for="extraOnlyW">只加 W 键</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="extraKeySelect" id="extraOnlyShift" value="onlyShift">
                        <label for="extraOnlyShift">只加 Shift 键</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="extraKeySelect" id="extraNone" value="none">
                        <label for="extraNone">不加键</label>
                    </div>
                </div>
                <div class="radio-group">
                    <div class="radio-row">
                        <input type="radio" name="keyStyle" id="keyStyleTriangle" value="triangle" checked>
                        <label for="keyStyleTriangle">加键样式：三角形</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="keyStyle" id="keyStyleCircle" value="circle">
                        <label for="keyStyleCircle">加键样式：圆形 (22mm)</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右手区域加键选项 -->
        <div class="option-group">
            <h3>右手区域加键选项</h3>
            <div class="radio-group">
                <div class="radio-row">
                    <input type="radio" name="rightHandKeys" id="rightNone" value="none" checked>
                    <label for="rightNone">不加键</label>
                </div>
                <div class="radio-row">
                    <input type="radio" name="rightHandKeys" id="rightThumb" value="thumb">
                    <label for="rightThumb">加 1键：食指左侧</label>
                </div>
                <div class="radio-row">
                    <input type="radio" name="rightHandKeys" id="rightIndex" value="index">
                    <label for="rightIndex">加 1键：大拇指右侧</label>
                </div>
                <div class="radio-row">
                    <input type="radio" name="rightHandKeys" id="rightBoth" value="both">
                    <label for="rightBoth">加 2键：大拇指右侧、食指左侧</label>
                </div>
            </div>
        </div>

        <div class="option-group">
            <h3>外观：选择颜色</h3>
            <div class="color-row">
                <span class="color-label">按键颜色</span>
                <input type="color" id="buttonColor" value="#2b3b4c">
            </div>
            <div class="color-row">
                <span class="color-label">盖板颜色</span>
                <input type="color" id="panelColor" value="#d9e2ec">
            </div>
            <div class="color-row">
                <span class="color-label">外壳颜色</span>
                <input type="color" id="caseColor" value="#3a4a5e">
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="unifyColors">
                <label for="unifyColors">面板与按键跟随外壳颜色</label>
            </div>
        </div>

        <div class="option-group">
            <h3>壁纸：设计你的壁纸</h3>
            <div class="wallpaper-upload">
                <div class="button-group">
                    <button class="action-btn" id="uploadWallpaperBtn">📁 选择图片</button>
                    <button class="action-btn small" id="clearWallpaperBtn">🗑️ 清除</button>
                </div>
                <div class="checkbox-row" style="margin-top: 8px; justify-content: center;">
                    <input type="checkbox" id="autoColorCheckbox">
                    <label for="autoColorCheckbox">从壁纸取色</label>
                </div>
                <div id="paletteContainer" class="palette-container" style="display: none;"></div>
                <input type="file" id="wallpaperFile" accept="image/*" class="file-input">
                <div class="wallpaper-status" id="wallpaperStatus">未设置壁纸</div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>缩放</span>
                        <span id="scaleValue">1.00x</span>
                    </div>
                    <input type="range" id="scaleSlider" min="0.2" max="3.0" step="0.01" value="1.0">
                </div>
            </div>
            <div style="margin-top: 16px;">
                <button class="export-btn" id="exportWallpaperBtn" style="width:100%;">
                    <span>🖼️ 导出壁纸 (A4打印)</span>
                    <span style="font-size:1.2rem;">↗</span>
                </button>
            </div>

            <!-- 裁剪辅助线选项容器 -->
            <div class="option-group" id="guideLineContainer" style="margin-top: 8px;">
                <h3>裁剪辅助线：</h3>
                <div class="radio-group">
                    <div class="radio-row">
                        <input type="radio" name="guideLine" id="guideNone" value="none" checked>
                        <label for="guideNone">不开启辅助线</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="guideLine" id="guideCircle" value="circle">
                        <label for="guideCircle">环形辅助线（盖板孔大小）</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="guideLine" id="guideSquare" value="square">
                        <label for="guideSquare">方形辅助线（轴座大小）</label>
                    </div>
                    <div class="radio-row">
                        <input type="radio" name="guideLine" id="guideSeparate" value="separate">
                        <label for="guideSeparate">上下壁纸分别使用环形/方形辅助线</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="option-group">
            <h3>其他配置</h3>
            <div class="feature-checkbox">
                <input type="checkbox" id="magneticCheck">
                <label for="magneticCheck">加装磁轴（3个方向键）</label>
            </div>
            <div class="feature-checkbox">
                <input type="checkbox" id="microCheck">
                <label for="microCheck">加装微动按键（2个功能键）</label>
            </div>
            <div class="feature-checkbox">
                <input type="checkbox" id="reinforcedCoverCheck">
                <label for="reinforcedCoverCheck">盖板加装螺丝</label>
            </div>
            <div class="feature-checkbox">
                <input type="checkbox" id="dockCheck">
                <label for="dockCheck">加装 Dock（5mm 超轻薄）</label>
            </div>
            <div id="dockSettings" class="dock-settings">
                <div class="dock-color-row">
                    <span class="color-label">Dock 颜色</span>
                    <input type="color" id="dockColor" value="#3a4a5e">
                </div>
                <div class="dock-follow-row">
                    <input type="checkbox" id="dockFollowCase" checked>
                    <label for="dockFollowCase">跟随外壳颜色</label>
                </div>
            </div>
        </div>

        <div class="export-buttons">
            <button class="export-btn secondary" id="exportProductBtn">
                <span>📦 导出产品配置 (含物料清单)</span>
                <span style="font-size:1.2rem;">↗</span>
            </button>
        </div>
        <div class="footer-note">
            科学街霸，从输入设备做起。
        </div>
    </div>
</div>
<div class="designer-credit">Designed by 搅局 · 双主题版</div>

<script>
(function() {
    const SCALE = 10; // 1mm = 10px

    // 外框 260x100mm，圆角13mm
    const outerW = 260 * SCALE;        // 2600
    const outerH = 100 * SCALE;        // 1000
    const outerRadius = 13 * SCALE;    // 130px

    // 内框 (盖板区域) 255.2x95.2mm
    const innerW = 255.2 * SCALE;      // 2552
    const innerH = 95.2 * SCALE;       // 952
    const offsetX = (outerW - innerW) / 2; // 24px
    const offsetY = (outerH - innerH) / 2; // 24px
    const innerRadius = 11.1 * SCALE;   // 111px

    // Dock 尺寸 (mm)
    const dockW = 276 * SCALE;          // 2760
    const dockH = 176 * SCALE;          // 1760
    const dockRadius = 21 * SCALE;      // 210px
    const dockOffset = 8 * SCALE;       // 80px

    // 按键半径 (用于圆形按键)
    const buttonRadii = {
        23: 23.5 / 2 * SCALE,   // 117.5px (23mm按键)
        26: 26.5 / 2 * SCALE,   // 132.5px (26mm按键)

        if (innerSize <= 0) return;
        const R = innerSize / Math.sqrt(3);

        ctx.lineWidth = 2 * cornerRadius;

        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
    }

        draw();
    });
    panelInput.addEventListener('input', (e) => { userCustomized = true; panelColor = e.target.value; if (unifyCheckbox.checked) unifyCheckbox.checked = false; draw(); });
    buttonInput.addEventListener('input', (e) => { userCustomized = true; buttonColor = e.target.value; if (unifyCheckbox.checked) unifyCheckbox.checked = false; draw(); });
    dockInput.addEventListener('input', (e) => { userCustomized = true; dockColor = e.target.value; if (dockFollowCheck.checked) dockFollowCheck.checked = false; draw(); });

    function handlePanelFocus() { if (wallpaperImage) { panelColorActive = true; wallpaperDimmed = true; draw(); } }
    function handlePanelBlur() { if (wallpaperImage) { panelColorActive = false; wallpaperDimmed = false; draw(); } }
    panelInput.addEventListener('focus', handlePanelFocus); panelInput.addEventListener('blur', handlePanelBlur);
    canvas.addEventListener('dblclick', (e) => { if (!wallpaperImage) return; e.preventDefault(); wallpaperFlipX = !wallpaperFlipX; draw(); });

    function updatePalette() {
        if (!wallpaperImage) { paletteContainer.style.display = 'none'; return; }
        try {
            paletteColors = colorThief.getPalette(wallpaperImage, 4);
            paletteContainer.innerHTML = '';
            paletteColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                swatch.addEventListener('click', () => {
                    const hex = `#${((1 << 24) + (color[0] << 16) + (color[1] << 8) + color[2]).toString(16).slice(1)}`;
                    applyColor(hex);
                });
                paletteContainer.appendChild(swatch);
            });
            paletteContainer.style.display = 'flex';
            guideLineContainer.style.display = 'block';
        } catch(err) { console.error('提取调色板失败', err); paletteContainer.style.display = 'none'; }
    }

    function applyColor(hex) {
        userCustomized = true; caseInput.value = hex; caseColor = hex;
        if (!unifyCheckbox.checked) { unifyCheckbox.checked = true; applyUnify(true); }
        else { panelColor = hex; buttonColor = hex; panelInput.value = hex; buttonInput.value = hex; }
        if (dockEnabled && !dockFollowCheck.checked) { dockFollowCheck.checked = true; dockColor = hex; dockInput.value = hex; }
        else if (dockEnabled && dockFollowCheck.checked) { dockColor = hex; dockInput.value = hex; }
        draw();
    }

    function applyWallpaperColor() {
        if (!wallpaperImage) return;
        try {
            const [r,g,b] = colorThief.getColor(wallpaperImage);
            const hex = `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
            applyColor(hex);
        } catch(err) { console.error('取色失败', err); alert('取色失败，请重试或选择其他图片。'); }
    }

    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                wallpaperImage = img;
                const scale = innerW / img.naturalWidth;
                wallpaperScale = scale; wallpaperOffsetX = 0; wallpaperOffsetY = 0; wallpaperFlipX = false;
                scaleSlider.value = scale.toFixed(2); scaleSpan.innerText = scale.toFixed(2) + 'x';
                wallpaperStatus.innerText = `已加载: ${file.name.slice(0,15)}...`;
                updatePalette();
                if (autoColorCheckbox.checked) applyWallpaperColor(); else draw();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    clearWallpaperBtn.addEventListener('click', () => {
        wallpaperImage = null; wallpaperDimmed = false; panelColorActive = false;
        wallpaperStatus.innerText = '未设置壁纸';
        paletteContainer.style.display = 'none';
        guideLineContainer.style.display = 'none';
        guideNone.checked = true; updateGuideLineMode();
        draw();
    });

    autoColorCheckbox.addEventListener('change', (e) => { if (e.target.checked) { if (!wallpaperImage) uploadBtn.click(); else applyWallpaperColor(); } });

    scaleSlider.addEventListener('input', (e) => { if (!wallpaperImage) return; wallpaperScale = parseFloat(e.target.value); scaleSpan.innerText = wallpaperScale.toFixed(2) + 'x'; draw(); });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (!wallpaperImage) return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        const baseCenterX = dockEnabled ? dockOffset + offsetX + innerW/2 : offsetX + innerW/2;
        const baseCenterY = dockEnabled ? dockOffset + offsetY + innerH/2 : offsetY + innerH/2;
        const oldScale = wallpaperScale;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        let newScale = oldScale * delta;
        newScale = Math.min(3.0, Math.max(0.2, newScale));
        const relX = (mouseX - baseCenterX - wallpaperOffsetX) / oldScale;
        const relY = (mouseY - baseCenterY - wallpaperOffsetY) / oldScale;
        wallpaperOffsetX = mouseX - baseCenterX - relX * newScale;
        wallpaperOffsetY = mouseY - baseCenterY - relY * newScale;
        wallpaperScale = newScale;
        scaleSlider.value = newScale; scaleSpan.innerText = newScale.toFixed(2) + 'x';
        draw();
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
        if (!wallpaperImage) return;
        e.preventDefault();
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        lastMouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        lastMouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        canvas.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !wallpaperImage) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        const dx = mouseX - lastMouseX, dy = mouseY - lastMouseY;
        wallpaperOffsetX += dx; wallpaperOffsetY += dy;
        lastMouseX = mouseX; lastMouseY = mouseY;
        draw();
    });
    window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });

    function exportWallpaper() {
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = 2970; exportCanvas.height = 2100;
        const eCtx = exportCanvas.getContext('2d');
        eCtx.fillStyle = '#ffffff'; eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        const positions = [{ left: 20*10, bottom: 108*10 }, { left: 20*10, bottom: 7.8*10 }];
        const productCenterX_mm = 130, productCenterY_mm = 50;

        positions.forEach((pos, idx) => {
            const leftPx = pos.left, bottomPx = pos.bottom, topPx = exportCanvas.height - bottomPx - innerH;
            let currentGuideMode = guideLineMode;
            if (guideLineMode === 'separate') currentGuideMode = idx === 0 ? 'circle' : 'square';

            eCtx.save();
            eCtx.beginPath();
            eCtx.moveTo(leftPx + innerRadius, topPx); eCtx.lineTo(leftPx + innerW - innerRadius, topPx);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx, leftPx + innerW, topPx + innerRadius);
            eCtx.lineTo(leftPx + innerW, topPx + innerH - innerRadius);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx + innerH, leftPx + innerW - innerRadius, topPx + innerH);
            eCtx.lineTo(leftPx + innerRadius, topPx + innerH);
            eCtx.quadraticCurveTo(leftPx, topPx + innerH, leftPx, topPx + innerH - innerRadius);
            eCtx.lineTo(leftPx, topPx + innerRadius);
            eCtx.quadraticCurveTo(leftPx, topPx, leftPx + innerRadius, topPx);
            eCtx.closePath();
            eCtx.clip();

            eCtx.fillStyle = `rgba(${parseInt(panelColor.slice(1,3),16)},${parseInt(panelColor.slice(3,5),16)},${parseInt(panelColor.slice(5,7),16)},${alphaPanel})`;
            eCtx.fillRect(leftPx, topPx, innerW, innerH);

            if (wallpaperImage) {
                const centerX = leftPx + innerW/2, centerY = topPx + innerH/2;
                eCtx.save();
                eCtx.translate(centerX + wallpaperOffsetX, centerY + wallpaperOffsetY);
                eCtx.scale(wallpaperFlipX ? -wallpaperScale : wallpaperScale, wallpaperScale);
                eCtx.drawImage(wallpaperImage, -wallpaperImage.naturalWidth/2, -wallpaperImage.naturalHeight/2, wallpaperImage.naturalWidth, wallpaperImage.naturalHeight);
                eCtx.restore();
            }
            eCtx.restore();

            if (currentGuideMode !== 'none') {
                const panelCenterX = leftPx + innerW/2, panelCenterY = topPx + innerH/2;
                eCtx.save();
                eCtx.strokeStyle = '#000000'; eCtx.lineWidth = 1;

                for (let idxBtn = 0; idxBtn <= 24; idxBtn++) {
                    // 右手区域加键控制
                    if (idxBtn === 3 && rightHandMode !== 'thumb' && rightHandMode !== 'both') continue;
                    if (idxBtn === 6 && rightHandMode !== 'index' && rightHandMode !== 'both') continue;

                    if (directionLayout === 'standard' && idxBtn >= 17) continue;
                    if (directionLayout === 'explorer' && (idxBtn <= 2 || (idxBtn >= 17 && idxBtn <= 19))) continue;
                    if (directionLayout === 'explorer') {
                        if (idxBtn === 23 && (extraKeySelect === 'onlyShift' || extraKeySelect === 'none')) continue;
                        if (idxBtn === 24 && (extraKeySelect === 'onlyW' || extraKeySelect === 'none')) continue;
                    }

                    let x_mm, y_mm;
                    if (idxBtn < 17) { x_mm = physCoords[idxBtn].x; y_mm = physCoords[idxBtn].y; }
                    else if (idxBtn >= 20 && idxBtn <= 24) { const expIdx = idxBtn - 20; x_mm = explorerPhys[expIdx].x; y_mm = explorerPhys[expIdx].y; }
                    else continue;

                    const relX_mm = x_mm - productCenterX_mm, relY_mm = y_mm - productCenterY_mm;
                    const x = panelCenterX + relX_mm * SCALE, y = panelCenterY - relY_mm * SCALE;

                    const is5mm = (idxBtn === 15 || idxBtn === 16);
                    if (is5mm) {
                        const r5 = 5.4 / 2 * SCALE;
                        eCtx.beginPath(); eCtx.arc(x, y, r5, 0, 2 * Math.PI); eCtx.stroke();
                    } else if (idxBtn === 23 || idxBtn === 24) {
                        const half = 8 * SCALE, radius = 0.4 * SCALE;
                        eCtx.beginPath();
                        eCtx.moveTo(x - half + radius, y - half); eCtx.lineTo(x + half - radius, y - half);
                        eCtx.quadraticCurveTo(x + half, y - half, x + half, y - half + radius);
                        eCtx.lineTo(x + half, y + half - radius);
                        eCtx.quadraticCurveTo(x + half, y + half, x + half - radius, y + half);
                        eCtx.lineTo(x - half + radius, y + half);
                        eCtx.quadraticCurveTo(x - half, y + half, x - half, y + half - radius);
                        eCtx.lineTo(x - half, y - half + radius);
                        eCtx.quadraticCurveTo(x - half, y - half, x - half + radius, y - half);
                        eCtx.closePath(); eCtx.stroke();
                    } else {
                        let r_px;
                        if (idxBtn <= 12 || idxBtn === 20 || idxBtn === 21 || idxBtn === 22) r_px = 24 / 2 * SCALE;
                        else if (idxBtn === 13 || idxBtn === 14) r_px = 27 / 2 * SCALE;
                        else r_px = 24 / 2 * SCALE;

                        if (currentGuideMode === 'circle') { eCtx.beginPath(); eCtx.arc(x, y, r_px, 0, 2 * Math.PI); eCtx.stroke(); }
                        else if (currentGuideMode === 'square') { const half = 7 * SCALE; eCtx.beginPath(); eCtx.rect(x - half, y - half, half*2, half*2); eCtx.stroke(); }
                    }

                    const crossHalf = 1 * SCALE;
                    eCtx.beginPath(); eCtx.moveTo(x - crossHalf, y); eCtx.lineTo(x + crossHalf, y);
                    eCtx.moveTo(x, y - crossHalf); eCtx.lineTo(x, y + crossHalf); eCtx.stroke();
                }
                eCtx.restore();
            }

            eCtx.save();
            eCtx.strokeStyle = '#111111'; eCtx.lineWidth = 1;
            eCtx.beginPath();
            eCtx.moveTo(leftPx + innerRadius, topPx); eCtx.lineTo(leftPx + innerW - innerRadius, topPx);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx, leftPx + innerW, topPx + innerRadius);
            eCtx.lineTo(leftPx + innerW, topPx + innerH - innerRadius);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx + innerH, leftPx + innerW - innerRadius, topPx + innerH);
            eCtx.lineTo(leftPx + innerRadius, topPx + innerH);
            eCtx.quadraticCurveTo(leftPx, topPx + innerH, leftPx, topPx + innerH - innerRadius);
            eCtx.lineTo(leftPx, topPx + innerRadius);
            eCtx.quadraticCurveTo(leftPx, topPx, leftPx + innerRadius, topPx);
            eCtx.closePath(); eCtx.stroke();
            eCtx.restore();
        });

        const link = document.createElement('a');
        link.download = 'Hitboard_Air_Wallpaper.png';
        link.href = exportCanvas.toDataURL('image/png');
        link.click();
    }

    function exportProductConfig() {
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = 2970; exportCanvas.height = 2100;
        const eCtx = exportCanvas.getContext('2d');
        eCtx.fillStyle = '#ffffff'; eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        let layoutName = directionLayout === 'standard' ? '与拳键对称' : '七星布局';
        let rightHandName = '';
        if (rightHandMode === 'none') rightHandName = '不加键';
        else if (rightHandMode === 'thumb') rightHandName = '大拇指右侧';
        else if (rightHandMode === 'index') rightHandName = '食指左侧';
        else if (rightHandMode === 'both') rightHandName = '大拇指右侧+食指左侧';
        let styleName = '';
        if (directionLayout === 'explorer') {
            styleName = keyStyle === 'triangle' ? '三角形' : '圆形';
            if (extraKeySelect === 'onlyW') styleName = '仅W键+' + styleName;
            else if (extraKeySelect === 'onlyShift') styleName = '仅Shift键+' + styleName;
            else if (extraKeySelect === 'none') styleName = '无加键';
            else styleName = 'W+Shift+' + styleName;
        }

        const titleText = userName ? 
            `${userName} 的 Hitboard Air（左手:${layoutName}、右手:${rightHandName}${styleName ? '、'+styleName : ''}）` : 
            `你的 Hitboard Air（左手:${layoutName}、右手:${rightHandName}${styleName ? '、'+styleName : ''}）`;
        eCtx.font = 'bold 36px "Microsoft YaHei", sans-serif';
        eCtx.fillStyle = '#1e2b3c'; eCtx.textAlign = 'center';
        eCtx.fillText(titleText, exportCanvas.width / 2, 60);

        const margin = 200, prodX = margin, prodY = 60 + 40;
        if (dockEnabled) {
            const dx = prodX - dockOffset, dy = prodY - dockOffset;
            eCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, dx, dy, canvas.width, canvas.height);
        } else {
            eCtx.drawImage(canvas, 0, 0, canvas.width, canvas.height, prodX, prodY, canvas.width, canvas.height);
        }

        const listStartY = prodY + outerH + 60, startX = margin + 30;
        let startY = listStartY;

        const baseItems = [
            { category: '必选', name: 'Hitboard Air 3D 打印套件', qty: '1套', cost: 30, supplier: '自选' },
            { category: '必选', name: '树莓派 Pico（RP2040 无焊接针脚）', qty: '1个', cost: 16, supplier: 'LOBOROBOT' },
            { category: '必选', name: '导线（#30 外径0.56mm）', qty: '4米', cost: 4, supplier: '便民发明' },
            { category: '必选', name: '导电胶按钮（KX-1059 10mm底 5mm粗 9mm高）', qty: '2个', cost: 1, supplier: '惠购之选' },
            { category: '必选', name: '猎隼mini轴', qty: '16个', cost: 46, supplier: '凯华' },
            { category: '必选', name: '凯华1350矮轴轴座', qty: '20个', cost: 9, supplier: 'YMDK' }
        ];

        let optionalItems = [];
        if (reinforcedCoverCheck.checked) {
            optionalItems.push({ category: '盖板加装螺丝', name: 'M2*8 螺丝（2mm 直径，8mm 长）', qty: '6颗', cost: 3, supplier: '固万基/以瑟' });
            optionalItems.push({ category: '盖板加装螺丝', name: 'M2 螺帽（ 1.8mm 高）', qty: '6颗', cost: 3, supplier: '固万基/以瑟' });
        }
        if (wallpaperImage) {
            optionalItems.push({ category: '选配壁纸', name: '亚克力面板（2mm 厚）', qty: '1张', cost: 6, supplier: '德耀' });
            optionalItems.push({ category: '选配壁纸', name: 'A4 壁纸打印（建议选择磨砂质感）', qty: '1张', cost: 4, supplier: 'E彩冲印' });
            optionalItems.push({ category: '选配壁纸', name: 'M2*8 螺丝（2mm 直径，8mm 长）', qty: '2颗', cost: 3, supplier: '固万基/以瑟' });
            optionalItems.push({ category: '选配壁纸', name: 'M2*5 螺丝（2mm 直径，5mm 长）', qty: '4颗', cost: 3, supplier: '固万基/以瑟' });
            optionalItems.push({ category: '选配壁纸', name: 'M2 螺帽（ 1.8mm 高）', qty: '6颗', cost: 3, supplier: '固万基/以瑟' });
        }
        if (microCheck.checked) optionalItems.push({ category: '选配微动', name: '凯华黄点微动_6*6*4.3', qty: '2个', cost: 6, supplier: '高芯达电子/芯场外设' });
        if (magneticCheck.checked) {
            optionalItems.push({ category: '选配磁轴', name: '49E 霍尔传感器', qty: '4个', cost: 2, supplier: '优信电子' });
            optionalItems.push({ category: '选配磁轴', name: '凯华磁轴（星磁 mini）', qty: '4个', cost: 11.9, supplier: '凯华' });
        }
        if (dockCheck.checked) {
            optionalItems.push({ category: '选配Dock', name: 'Dock 3D 打印套件', qty: '1套', cost: 20, supplier: '自选' });
            optionalItems.push({ category: '选配Dock', name: '圆形强力磁铁（直径 6x 高度2mm）', qty: '18颗', cost: 6, supplier: '磁悦旗舰店' });
            optionalItems.push({ category: '选配Dock', name: 'M2*5 螺丝（2mm 直径，5mm 长）', qty: '2颗', cost: 3, supplier: '固万基/以瑟' });
            optionalItems.push({ category: '选配Dock', name: 'M2 螺帽（ 1.8mm 高）', qty: '2颗', cost: 3, supplier: '固万基/以瑟' });
        }

        const nutIndices = [];
        optionalItems.forEach((item, idx) => { if (item.name === 'M2 螺帽（ 1.8mm 高）' && item.qty === '6颗') nutIndices.push(idx); });
        if (nutIndices.length > 1) {
            const firstNut = optionalItems[nutIndices[0]];
            firstNut.category = '盖板加装螺丝/选配壁纸';
            for (let i = nutIndices.length - 1; i > 0; i--) optionalItems.splice(nutIndices[i], 1);
        }

        const screwMap = new Map();
        optionalItems.forEach(item => {
            const key = `${item.name}|${item.supplier}`;
            if (!screwMap.has(key)) screwMap.set(key, item.cost);
            else item.cost = 0;
        });

        const allItems = baseItems.concat(optionalItems);
        const titleFontSize = 36, headerFontSize = 27, rowFontSize = 24;

        eCtx.save(); eCtx.globalAlpha = 0.8;
        eCtx.font = `bold ${titleFontSize}px "Microsoft YaHei", sans-serif`;
        eCtx.fillStyle = '#000000';
        eCtx.fillText('物料清单', startX, startY);
        startY += titleFontSize + 15;

        eCtx.font = `bold ${headerFontSize}px "Microsoft YaHei", sans-serif`;
        const colWidths = [180, 550, 100, 140, 380];
        let x = startX;
        eCtx.fillText('分类', x, startY); x += colWidths[0];
        eCtx.fillText('内容', x + 150, startY); x += colWidths[1];
        eCtx.fillText('数量', x, startY); x += colWidths[2];
        eCtx.fillText('成本估算', x, startY); x += colWidths[3];
        eCtx.fillText('厂家/店铺', x, startY);
        startY += headerFontSize + 10;

        const lineColor = dockEnabled ? dockColor : '#ccc';
        eCtx.strokeStyle = lineColor; eCtx.lineWidth = 2;
        eCtx.beginPath(); eCtx.moveTo(startX, startY - 15); eCtx.lineTo(startX + colWidths.reduce((a,b)=>a+b,0), startY - 15); eCtx.stroke();

        eCtx.font = `${rowFontSize}px "Microsoft YaHei", sans-serif`;
        allItems.forEach(item => {
            if (startY > exportCanvas.height - 60) return;
            let x = startX;
            eCtx.fillText(item.category, x, startY); x += colWidths[0];
            eCtx.fillText(item.name, x + 150, startY); x += colWidths[1];
            eCtx.fillText(item.qty, x, startY); x += colWidths[2];
            eCtx.fillText('¥' + item.cost.toFixed(2), x, startY); x += colWidths[3];
            eCtx.fillText(item.supplier, x, startY);
            startY += rowFontSize + 8;
        });

        const totalCost = allItems.reduce((sum, item) => sum + item.cost, 0);
        eCtx.font = `bold ${rowFontSize}px "Microsoft YaHei", sans-serif`;
        const totalText = `总计：¥${totalCost.toFixed(2)}`;
        const costColX = startX + colWidths[0] + colWidths[1] + colWidths[2];
        const costColWidth = colWidths[3];
        const textWidth = eCtx.measureText(totalText).width;
        const totalX = costColX + costColWidth - textWidth - 10;
        eCtx.fillText(totalText, totalX, startY);
        eCtx.restore();

        const link = document.createElement('a');
        link.download = 'Hitboard_Air_ProductConfig.png';
        link.href = exportCanvas.toDataURL('image/png');
        link.click();
    }

    exportWallpaperBtn.addEventListener('click', exportWallpaper);
    exportProductBtn.addEventListener('click', exportProductConfig);

    canvas.style.cursor = 'grab';
    updateCanvasSize();
})();
</script>
</body>
